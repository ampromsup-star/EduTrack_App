<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduScan - ระบบจัดการห้องเรียน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #F8FAFC; }
        .sidebar-btn { @apply w-full flex items-center gap-3 p-3 mb-2 rounded-2xl transition-all text-slate-600 font-medium hover:bg-blue-50; }
        .sidebar-btn.active { @apply bg-blue-600 text-white shadow-lg; }
        .student-card { @apply bg-white p-4 rounded-3xl shadow-sm border border-slate-100 text-center relative transition hover:-translate-y-1 hover:shadow-md; }
    </style>
</head>
<body>

    <div class="flex min-h-screen">
        <aside class="w-64 bg-white shadow-xl hidden md:flex flex-col p-5 border-r">
            <div class="text-2xl font-black text-blue-600 mb-10 italic">EduScan</div>
            <nav class="flex-1">
                <button onclick="showPage('dashboard')" id="btn-dashboard" class="sidebar-btn active">🏠 แผงควบคุม</button>
                <button onclick="showPage('students')" id="btn-students" class="sidebar-btn">👥 จัดการนักเรียน</button>
                <button onclick="showPage('assignments')" id="btn-assignments" class="sidebar-btn">📚 จัดการใบงาน</button>
                <button onclick="exportReport()" class="sidebar-btn text-emerald-600 mt-5 font-bold">📊 ออกรายงาน</button>
            </nav>
        </aside>

        <main class="flex-1 p-6 md:p-10">
            <div id="dashboard-content">
                <h1 class="text-3xl font-extrabold text-slate-800 mb-6">ยินดีต้อนรับสู่ห้องเรียน</h1>
                <div id="student-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4">
                    </div>
            </div>

            <div id="students-content" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">รายชื่อนักเรียน</h2>
                    <button onclick="editStudent()" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold">+ เพิ่มนักเรียน</button>
                </div>
                <div class="bg-white rounded-3xl shadow-sm overflow-hidden border">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="p-4">เลขที่/ID</th>
                                <th class="p-4">ชื่อ-นามสกุล</th>
                                <th class="p-4">ชื่อเล่น</th>
                                <th class="p-4 text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="student-table-body" class="divide-y"></tbody>
                    </table>
                </div>
            </div>

            <div id="assignments-content" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">จัดการใบงาน</h2>
                    <button onclick="editAssignment()" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold">+ เพิ่มใบงาน</button>
                </div>
                <div id="assignment-list" class="grid gap-4"></div>
            </div>
        </main>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxyRyYhVQVBLSwyyKLgzjzmjeGEIrtVEcPTejmxeQi6NyNYiPzbQZbDfGHHsex2Xa2thg/exec";

        async function api(data) {
            const res = await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            });
            return await res.json();
        }

        function showPage(page) {
            ['dashboard', 'students', 'assignments'].forEach(p => {
                document.getElementById(p + '-content').classList.add('hidden');
                document.getElementById('btn-' + p).classList.remove('active');
            });
            document.getElementById(page + '-content').classList.remove('hidden');
            document.getElementById('btn-' + page).classList.add('active');
            
            if(page === 'dashboard' || page === 'students') loadStudents();
        }

        async function loadStudents() {
            const data = await api({ action: 'getStudents' });
            
            // แสดงผลหน้า Dashboard (Grid View)
            document.getElementById('student-grid').innerHTML = data.map(s => `
                <div class="student-card">
                    <div class="w-16 h-16 bg-slate-100 rounded-full mx-auto mb-3 flex items-center justify-center text-xl font-bold text-blue-500">
                        ${s.nickname ? s.nickname[0] : '?'}
                    </div>
                    <div class="font-bold text-slate-700">${s.id} ${s.nickname || ''}</div>
                    <div class="text-xs text-slate-400 truncate">${s.name}</div>
                    <div class="absolute top-2 right-2 bg-yellow-400 text-white text-[10px] px-2 rounded-full">${s.score}</div>
                </div>
            `).join('');

            // แสดงผลหน้าจัดการนักเรียน (Table View)
            document.getElementById('student-table-body').innerHTML = data.map(s => `
                <tr>
                    <td class="p-4">${s.id}</td>
                    <td class="p-4 font-bold">${s.name}</td>
                    <td class="p-4">${s.nickname}</td>
                    <td class="p-4 text-center">
                        <button onclick='editStudent(${JSON.stringify(s)})' class="text-blue-600 mx-2">แก้ไข</button>
                        <button onclick="deleteRow('deleteStudent', ${s.row})" class="text-red-400 mx-2">ลบ</button>
                    </td>
                </tr>
            `).join('');
        }

        function editStudent(s = {}) {
            Swal.fire({
                title: s.row ? 'แก้ไขข้อมูลนักเรียน' : 'เพิ่มนักเรียนใหม่',
                html: `
                    <input id="sw-id" class="swal2-input" placeholder="เลขที่/รหัส" value="${s.id || ''}">
                    <input id="sw-name" class="swal2-input" placeholder="ชื่อ-นามสกุล" value="${s.name || ''}">
                    <input id="sw-nick" class="swal2-input" placeholder="ชื่อเล่น" value="${s.nickname || ''}">
                    <input id="sw-score" type="number" class="swal2-input" placeholder="คะแนนสะสม" value="${s.score || 0}">
                `,
                preConfirm: () => ({
                    action: 'saveStudent',
                    row: s.row,
                    id: document.getElementById('sw-id').value,
                    name: document.getElementById('sw-name').value,
                    nickname: document.getElementById('sw-nick').value,
                    score: document.getElementById('sw-score').value
                })
            }).then(async res => {
                if(res.isConfirmed) {
                    await api(res.value);
                    loadStudents();
                }
            });
        }

        async function deleteRow(action, row) {
            if(confirm('ยืนยันการลบข้อมูลนี้หรือไม่?')) {
                await api({ action, row });
                showPage('dashboard');
            }
        }

        async function exportReport() {
            Swal.fire('กำลังเตรียมข้อมูล...');
            const data = await api({ action: 'getReport' });
            let csv = "ID,Name,Nickname,Score\n";
            data.students.forEach(s => {
                csv += `${s.id},${s.name},${s.nickname},${s.score}\n`;
            });
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "student_report.csv";
            link.click();
            Swal.fire('ดาวน์โหลดรายงานสำเร็จ');
        }

        // เริ่มต้นโหลดหน้า Dashboard
        window.onload = () => loadStudents();
    </script>
</body>
</html>
