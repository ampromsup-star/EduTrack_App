<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack - ระบบจัดการห้องเรียน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #F8FAFC; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="text-slate-800">

    <div id="app" class="flex min-h-screen">
        <aside class="w-64 bg-white shadow-xl hidden md:flex flex-col border-r border-blue-50">
            <div class="p-6 text-2xl font-bold text-blue-600 italic">EduScan</div>
            <nav class="flex-1 px-4">
                <button onclick="showPage('dashboard')" id="btn-dashboard" class="w-full flex items-center p-3 mb-2 rounded-xl transition-all">🏠 Dashboard</button>
                <button onclick="showPage('scan')" id="btn-scan" class="w-full flex items-center p-3 mb-2 text-slate-500 rounded-xl transition-all">📸 เช็คชื่อ/ตรวจงาน</button>
                <button onclick="showPage('assignments')" id="btn-assignments" class="w-full flex items-center p-3 mb-2 text-slate-500 rounded-xl transition-all">📚 รายการใบงาน</button>
            </nav>
            <div class="p-4 border-t border-slate-100">
                <button onclick="location.reload()" class="text-red-400 text-sm hover:underline font-medium">ออกจากระบบ</button>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-10">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-2xl font-bold" id="page-title">สรุปภาพรวม</h1>
                    <p class="text-slate-400 text-sm">ระบบจัดการการเรียน ปวช./ปวส.</p>
                </div>
                <div class="flex items-center gap-4">
                    <span id="user-display" class="font-medium text-blue-600">กำลังโหลด...</span>
                    <div class="w-10 h-10 rounded-full bg-blue-100 border-2 border-white shadow-sm flex items-center justify-center text-blue-500 font-bold">U</div>
                </div>
            </header>

            <div id="dashboard-content" class="grid grid-cols-1 md:grid-cols-3 gap-6 animate-fade-in">
                <div class="glass-card p-6 rounded-3xl shadow-sm border-b-4 border-blue-400">
                    <p class="text-slate-500 text-sm">เข้าเรียนวันนี้</p>
                    <h2 class="text-3xl font-bold mt-2">85%</h2>
                </div>
                <div class="glass-card p-6 rounded-3xl shadow-sm border-b-4 border-emerald-400">
                    <p class="text-slate-500 text-sm">ส่งงานแล้ว (ชิ้น)</p>
                    <h2 class="text-3xl font-bold mt-2">12/15</h2>
                </div>
                <div class="glass-card p-6 rounded-3xl shadow-sm border-b-4 border-orange-400">
                    <p class="text-slate-500 text-sm">งานที่รอตรวจ</p>
                    <h2 class="text-3xl font-bold mt-2">3</h2>
                </div>
            </div>

            <div id="scan-content" class="hidden max-w-xl mx-auto">
                <div class="bg-white p-6 rounded-3xl shadow-lg text-center border border-blue-50">
                    <h3 class="text-lg font-bold mb-4 text-blue-600">สแกน QR Code</h3>
                    <div id="reader" class="rounded-2xl overflow-hidden shadow-inner"></div>
                </div>
            </div>
            
            <audio id="snd_ok" src="https://www.soundjay.com/buttons/beep-07a.mp3"></audio>
        </main>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzu7KkeOKU4cu6FeFG32pPgKqSI-A06F4nAM24HXkZ3iZ_iOzBMY8a2TxJ2rhU_B446vw/exec";
        let html5QrcodeScanner = null;

        function showPage(page) {
            document.getElementById('dashboard-content').classList.toggle('hidden', page !== 'dashboard');
            document.getElementById('scan-content').classList.toggle('hidden', page !== 'scan');
            document.getElementById('page-title').innerText = (page === 'dashboard') ? 'สรุปภาพรวม' : 'สแกน QR Code';
            
            // อัปเดตสีปุ่ม
            ['btn-dashboard', 'btn-scan'].forEach(id => {
                const btn = document.getElementById(id);
                if (id.includes(page)) {
                    btn.classList.add('text-blue-600', 'bg-blue-50', 'font-semibold');
                    btn.classList.remove('text-slate-500');
                } else {
                    btn.classList.remove('text-blue-600', 'bg-blue-50', 'font-semibold');
                    btn.classList.add('text-slate-500');
                }
            });

            if(page === 'scan') startScanner();
            else if(html5QrcodeScanner) html5QrcodeScanner.clear();
        }

        function startScanner() {
            if(!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            }
            html5QrcodeScanner.render(async (decodedText) => {
                document.getElementById('snd_ok').play();
                html5QrcodeScanner.pause();
                
                Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

                try {
                    const response = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'recordAttendance', studentId: decodedText, courseId: 'C001' })
                    });
                    const res = await response.json();
                    if(res.status === "success") {
                        Swal.fire('สำเร็จ!', `บันทึกเวลาเรียบร้อย (${res.info})`, 'success').then(() => html5QrcodeScanner.resume());
                    }
                } catch (e) {
                    Swal.fire('Error', 'เชื่อมต่อฐานข้อมูลไม่ได้', 'error').then(() => html5QrcodeScanner.resume());
                }
            });
        }

        window.onload = () => {
            document.getElementById('user-display').innerText = "ครูสมศรี (Teacher)";
            showPage('dashboard');
        };
    </script>
</body>
</html>
