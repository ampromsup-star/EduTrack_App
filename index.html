<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; }
        .active-nav { @apply bg-blue-600 text-white shadow-lg; }
        .card-student { @apply bg-white p-4 rounded-3xl shadow-sm border border-slate-200 text-center transition hover:shadow-md; }
    </style>
</head>
<body class="text-slate-700">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-white p-6 border-r hidden md:block">
            <h1 class="text-2xl font-black text-blue-600 italic mb-10">EduScan</h1>
            <nav class="space-y-2">
                <button onclick="nav('dash')" id="m-dash" class="w-full flex p-3 rounded-2xl font-bold active-nav">🏠 แผงควบคุม</button>
                <button onclick="nav('std')" id="m-std" class="w-full flex p-3 rounded-2xl font-bold text-slate-500">👥 จัดการนักเรียน</button>
                <button onclick="nav('asgn')" id="m-asgn" class="w-full flex p-3 rounded-2xl font-bold text-slate-500">📚 จัดการใบงาน</button>
                <hr class="my-4">
                <button onclick="exportCSV()" class="w-full flex p-3 rounded-2xl font-bold text-emerald-600 bg-emerald-50">📊 สรุปรายงาน</button>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 id="page-title" class="text-3xl font-extrabold">ยินดีต้อนรับสู่ห้องเรียน</h2>
                    <p class="text-slate-400">ระบบจัดการนักเรียนและคะแนน ปวช./ปวส.</p>
                </div>
                <div class="bg-white px-4 py-2 rounded-full border shadow-sm flex items-center gap-3">
                    <div class="w-8 h-8 bg-blue-500 rounded-full text-white flex items-center justify-center font-bold">T</div>
                    <span class="font-bold text-sm">คุณครู Admin</span>
                </div>
            </div>

            <div id="p-dash" class="page">
                <div id="grid-std" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
                    </div>
            </div>

            <div id="p-std" class="page hidden">
                <div class="flex justify-between mb-4">
                    <h3 class="text-xl font-bold">รายชื่อนักเรียนทั้งหมด</h3>
                    <button onclick="editStd()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">+ เพิ่มนักเรียน</button>
                </div>
                <div class="bg-white rounded-3xl border overflow-hidden shadow-sm">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr><th class="p-4">ID</th><th class="p-4">ชื่อ-นามสกุล</th><th class="p-4">ชื่อเล่น</th><th class="p-4 text-center">จัดการ</th></tr>
                        </thead>
                        <tbody id="table-std" class="divide-y"></tbody>
                    </table>
                </div>
            </div>

            <div id="p-asgn" class="page hidden">
                <div class="flex justify-between mb-4">
                    <h3 class="text-xl font-bold">รายการใบงาน</h3>
                    <button onclick="editAsgn()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">+ เพิ่มใบงาน</button>
                </div>
                <div id="list-asgn" class="grid gap-4"></div>
            </div>
        </main>
    </div>

    <script>
        // เปลี่ยนเป็น Web App URL ของคุณ
        const API_URL = "https://script.google.com/macros/s/AKfycbwgoX--tUSaas2ryVjkeBcKhY_1HnMRUsk-3JQuiLzVSBUn9Dqon-UMig5beBobUbgtIA/exec";

        function nav(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.add('hidden'));
            document.getElementById('p-'+p).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-nav', 'text-white'));
            document.getElementById('m-'+p).classList.add('active-nav');
            refreshData();
        }

        async function call(data) {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
            return await res.json();
        }

        async function refreshData() {
            const students = await call({ action: 'getStudents' });
            
            // Render Dash (Grid)
            document.getElementById('grid-std').innerHTML = students.map(s => `
                <div class="card-student">
                    <div class="w-16 h-16 bg-blue-50 text-blue-500 rounded-full mx-auto mb-3 flex items-center justify-center text-xl font-bold border-2 border-blue-100">${s.nickname?.[0] || '?'}</div>
                    <div class="font-bold text-slate-700">#${s.id}</div>
                    <div class="text-sm font-bold text-blue-600">${s.nickname || 'ไม่มีชื่อ'}</div>
                    <div class="text-[10px] text-slate-400 truncate">${s.name}</div>
                    <div class="mt-2 bg-slate-100 text-[10px] py-1 rounded-full font-bold">คะแนน: ${s.score}</div>
                </div>
            `).join('');

            // Render Table
            document.getElementById('table-std').innerHTML = students.map(s => `
                <tr>
                    <td class="p-4 font-bold">#${s.id}</td>
                    <td class="p-4 font-medium">${s.name}</td>
                    <td class="p-4">${s.nickname}</td>
                    <td class="p-4 text-center">
                        <button onclick='editStd(${JSON.stringify(s)})' class="text-blue-500 font-bold mx-2">แก้ไข</button>
                        <button onclick="del('deleteStudent', ${s.row})" class="text-red-400 font-bold mx-2">ลบ</button>
                    </td>
                </tr>
            `).join('');
        }

        function editStd(s = {}) {
            Swal.fire({
                title: s.row ? 'แก้ไขนักเรียน' : 'เพิ่มนักเรียน',
                html: `
                    <input id="f-id" class="swal2-input" placeholder="เลขที่/ID" value="${s.id||''}">
                    <input id="f-name" class="swal2-input" placeholder="ชื่อ-นามสกุล" value="${s.name||''}">
                    <input id="f-nick" class="swal2-input" placeholder="ชื่อเล่น" value="${s.nickname||''}">
                    <input id="f-score" type="number" class="swal2-input" placeholder="คะแนน" value="${s.score||0}">
                `,
                preConfirm: () => ({
                    action: 'saveStudent', row: s.row,
                    id: document.getElementById('f-id').value,
                    name: document.getElementById('f-name').value,
                    nickname: document.getElementById('f-nick').value,
                    score: document.getElementById('f-score').value
                })
            }).then(r => r.isConfirmed && call(r.value).then(refreshData));
        }

        async function del(action, row) {
            if(confirm('ยืนยันการลบ?')) {
                await call({ action, row });
                refreshData();
            }
        }

        async function exportCSV() {
            const data = await call({ action: 'getReport' });
            let csv = "ID,Name,Nickname,Score\n";
            data.students.forEach(s => csv += `${s.id},${s.name},${s.nickname},${s.score}\n`);
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "report.csv"; a.click();
        }

        window.onload = refreshData;
    </script>
</body>
</html>
